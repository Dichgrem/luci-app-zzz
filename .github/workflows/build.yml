name: Build
on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build-apk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            sdk_url: https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          - arch: aarch64_cortex-a53
            sdk_url: https://downloads.openwrt.org/releases/25.12.0/targets/mediatek/filogic/openwrt-sdk-25.12.0-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          - arch: aarch64_generic
            sdk_url: https://downloads.openwrt.org/releases/25.12.0/targets/rockchip/armv8/openwrt-sdk-25.12.0-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          - arch: mipsel_24kc
            sdk_url: https://downloads.openwrt.org/releases/25.12.0/targets/ramips/mt7621/openwrt-sdk-25.12.0-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          - arch: i386_pentium4
            sdk_url: https://downloads.openwrt.org/releases/25.12.0/targets/x86/generic/openwrt-sdk-25.12.0-x86-generic_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          - arch: arm_cortex-a9_vfpv3-d16
            sdk_url: https://downloads.openwrt.org/releases/25.12.0/targets/mvebu/cortexa9/openwrt-sdk-25.12.0-mvebu-cortexa9_gcc-14.3.0_musl_eabi.Linux-x86_64.tar.zst
          - arch: arm_cortex-a7_neon-vfpv4
            sdk_url: https://downloads.openwrt.org/releases/25.12.0/targets/ipq40xx/generic/openwrt-sdk-25.12.0-ipq40xx-generic_gcc-14.3.0_musl_eabi.Linux-x86_64.tar.zst
    env:
      WORK_ROOT: ${{ github.workspace }}/openwrt-sdk
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3-setuptools \
            rsync swig unzip zlib1g-dev file wget curl jq zstd
      - name: Generate signing key
        run: |
          mkdir -p ~/.openwrt-key
          if [ -n "${{ secrets.REPO_KEY }}" ]; then
            echo "${{ secrets.REPO_KEY }}" > ~/.openwrt-key/key.pem
          else
            openssl ecparam -name prime256v1 -genkey -noout \
              -out ~/.openwrt-key/key.pem
          fi
          openssl ec -in ~/.openwrt-key/key.pem \
            -pubout -out ~/.openwrt-key/key.pub.pem
          chmod 600 ~/.openwrt-key/key.pem
      - name: Download & Extract SDK
        run: |
          set -e
          mkdir -p "$WORK_ROOT"
          cd "$WORK_ROOT"
          wget -q --show-progress "${{ matrix.sdk_url }}" -O sdk.tar.zst
          tar --use-compress-program="zstd -d -q" -xf sdk.tar.zst
          SDK_ROOT=$(find . -maxdepth 1 -type d -name "openwrt-sdk*" | head -n 1)
          echo "SDK_ROOT=$(cd "$SDK_ROOT" && pwd)" >> $GITHUB_ENV
      - name: Setup feeds
        run: |
          cd "$SDK_ROOT"
          sed -i '/^src-git zzz/d' feeds.conf.default || true
          echo "src-git zzz https://github.com/${{ github.repository }}.git;main" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds update luci
          ./scripts/feeds update zzz
          ./scripts/feeds install -a -p luci
          ./scripts/feeds install luci-app-zzz zzz
      - name: Build & Generate index
        run: |
          set -euo pipefail
          cd "$SDK_ROOT"
          make defconfig
          cp ~/.openwrt-key/key.pem $(make -s val.BUILD_KEY_APK_SEC)
          cp ~/.openwrt-key/key.pub.pem $(make -s val.BUILD_KEY_APK_PUB)
          make package/luci-app-zzz/compile -j$(nproc) V=s
          make package/zzz/compile -j$(nproc) V=s
          make package/index V=s
      - name: Collect packages
        run: |
          ARCH="${{ matrix.arch }}"
          mkdir -p output
          find "$SDK_ROOT/bin/packages" -type f \
            \( -name "zzz*.apk" \
               -o -name "luci-app-zzz*.apk" \
               -o -name "luci-i18n-zzz*.apk" \) \
            -exec cp {} output/ \;
          find "$SDK_ROOT/bin/packages/$ARCH" -name "packages.adb" \
            -exec cp {} output/ \; 2>/dev/null || true
          cp ~/.openwrt-key/key.pub.pem output/
          echo "Collected packages:"
          ls -lah output/
      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: apk-${{ matrix.arch }}
          path: output/
          if-no-files-found: error
  build-ipk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/openwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - arch: aarch64_cortex-a53
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/mediatek/filogic/openwrt-sdk-24.10.5-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - arch: aarch64_generic
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/rockchip/armv8/openwrt-sdk-24.10.5-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - arch: mipsel_24kc
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/ramips/mt7621/openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - arch: i386_pentium4
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/x86/generic/openwrt-sdk-24.10.5-x86-generic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - arch: arm_cortex-a9_vfpv3-d16
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/mvebu/cortexa9/openwrt-sdk-24.10.5-mvebu-cortexa9_gcc-13.3.0_musl_eabi.Linux-x86_64.tar.zst
          - arch: arm_cortex-a7_neon-vfpv4
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/ipq40xx/generic/openwrt-sdk-24.10.5-ipq40xx-generic_gcc-13.3.0_musl_eabi.Linux-x86_64.tar.zst
    env:
      WORK_ROOT: ${{ github.workspace }}/openwrt-sdk
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3-setuptools python3-pyelftools \
            rsync swig unzip zlib1g-dev file wget curl jq zstd
      - name: Download & Extract SDK
        run: |
          set -e
          mkdir -p "$WORK_ROOT"
          cd "$WORK_ROOT"
          wget -q --show-progress "${{ matrix.sdk_url }}" -O sdk.tar.zst
          tar --use-compress-program="zstd -d -q" -xf sdk.tar.zst
          SDK_ROOT=$(find . -maxdepth 1 -type d -name "openwrt-sdk*" | head -n 1)
          echo "SDK_ROOT=$(cd "$SDK_ROOT" && pwd)" >> $GITHUB_ENV
      - name: Setup feeds
        run: |
          cd "$SDK_ROOT"
          sed -i '/^src-git zzz/d' feeds.conf.default || true
          echo "src-git zzz https://github.com/${{ github.repository }}.git;main" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      - name: Build
        run: |
          set -euo pipefail
          cd "$SDK_ROOT"
          make defconfig
          make package/luci-app-zzz/compile -j$(nproc) V=s
          make package/zzz/compile -j$(nproc) V=s
      - name: Generate signing key
        run: |
          if [ -n "${{ secrets.REPO_KEY_USIGN }}" ]; then
            echo "${{ secrets.REPO_KEY_USIGN }}" > "$SDK_ROOT/key-build"
            echo "${{ secrets.REPO_KEY_USIGN_PUB }}" > "$SDK_ROOT/key-build.pub"
          else
            cd "$SDK_ROOT"
            ./staging_dir/host/bin/usign -G \
              -s key-build \
              -p key-build.pub \
              -c "Local build key"
          fi
      - name: Generate index
        run: |
          cd "$SDK_ROOT"
          make package/index V=s
      - name: Collect packages
        run: |
          ARCH="${{ matrix.arch }}"
          mkdir -p output
          find "$SDK_ROOT/bin/packages" -type f \
            \( -name "zzz*.ipk" \
               -o -name "luci-app-zzz*.ipk" \
               -o -name "luci-i18n-zzz*.ipk" \) \
            -exec cp {} output/ \;
          find "$SDK_ROOT/bin/packages/$ARCH" \
            \( -name "Packages" -o -name "Packages.gz" -o -name "Packages.sig" \) \
            -exec cp {} output/ \; 2>/dev/null || true
          cp "$SDK_ROOT/key-build.pub" output/
          echo "Collected packages:"
          ls -lah output/
      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ipk-${{ matrix.arch }}
          path: output/
          if-no-files-found: error
  publish:
    needs: [build-apk, build-ipk]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts
      - name: Arrange repository structure
        run: |
          mkdir -p repo
          for d in artifacts/apk-*; do
            arch="${d#artifacts/apk-}"
            mkdir -p "repo/apk/${arch}"
            cp -r "$d"/. "repo/apk/${arch}/"
          done
          for d in artifacts/ipk-*; do
            arch="${d#artifacts/ipk-}"
            mkdir -p "repo/ipk/${arch}"
            cp -r "$d"/. "repo/ipk/${arch}/"
          done
          echo "Repository structure:"
          find repo -type f | sort
      - name: Generate index page
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          BASE="https://${OWNER}.github.io/${REPO}"
          cat > repo/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>${REPO} - OpenWrt Package Feed</title>
            <style>
              body { font-family: monospace; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
              h1 { font-size: 1.2rem; border-bottom: 1px solid #ccc; padding-bottom: 0.5rem; }
              h2 { font-size: 1rem; margin-top: 1.5rem; }
              ul { list-style: none; padding: 0; }
              li::before { content: "📁 "; }
              a { text-decoration: none; color: #0366d6; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>Index of ${REPO}</h1>
            <h2>APK (OpenWrt 25.12+)</h2>
            <ul>
          $(for d in repo/apk/*; do [ -d "$d" ] && arch=$(basename "$d") && echo "    <li><a href=\"${BASE}/apk/${arch}/\">apk/${arch}/</a></li>"; done)
            </ul>
            <h2>IPK (OpenWrt 24.10 / opkg)</h2>
            <ul>
          $(for d in repo/ipk/*; do [ -d "$d" ] && arch=$(basename "$d") && echo "    <li><a href=\"${BASE}/ipk/${arch}/\">ipk/${arch}/</a></li>"; done)
            </ul>
          </body>
          </html>
          EOF
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: repo
          keep_files: false
          commit_message: "deploy: update package feed [skip ci]"
