name: Build Package

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "Select OpenWrt version"
        required: true
        type: choice
        options:
          - "24.10"
          - "25.10"
      ramips:
        description: "Build ramips"
        type: boolean
        default: true
      filogic:
        description: "Build filogic"
        type: boolean
        default: true
      x86_64:
        description: "Build x86_64"
        type: boolean
        default: true

jobs:
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.set-matrix.outputs.architectures }}
    steps:
      - name: Generate matrix
        id: set-matrix
        run: |
          ARCHS='['
          if [ "${{ inputs.ramips }}" == "true" ]; then
            ARCHS=$ARCHS'"ramips",'
          fi
          if [ "${{ inputs.filogic }}" == "true" ]; then
            ARCHS=$ARCHS'"filogic",'
          fi
          if [ "${{ inputs.x86_64 }}" == "true" ]; then
            ARCHS=$ARCHS'"x86_64",'
          fi
          ARCHS=${ARCHS%,}
          ARCHS=$ARCHS']'
          echo "architectures=$ARCHS" >> $GITHUB_OUTPUT

  build:
    needs: matrix-setup
    if: needs.matrix-setup.outputs.architectures != '[]'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        sdk: ${{ fromJson(needs.matrix-setup.outputs.architectures) }}

    env:
      WORK_ROOT: ${{ github.workspace }}/openwrt-sdk

      # ===============================
      # 24.10 SDK（IPK）
      # ===============================
      RAMIPS_24_URL: https://downloads.openwrt.org/releases/24.10.5/targets/ramips/mt7621/openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
      FILOGIC_24_URL: https://downloads.openwrt.org/releases/24.10.5/targets/mediatek/filogic/openwrt-sdk-24.10.5-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
      X86_24_URL: https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/openwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst

      # ===============================
      # 25.10 SDK（APK）
      # ===============================
      RAMIPS_25_URL: https://downloads.openwrt.org/releases/25.12.0/targets/ramips/mt7621/openwrt-sdk-25.12.0-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst
      FILOGIC_25_URL: https://downloads.openwrt.org/releases/25.12.0/targets/mediatek/filogic/openwrt-sdk-25.12.0-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst
      X86_25_URL: https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git wget python3 rsync \
            zstd g++ make libncurses-dev

      - name: Select SDK URL
        run: |
          ARCH="${{ matrix.sdk }}"
          VERSION="${{ inputs.openwrt_version }}"

          if [ "$VERSION" == "24.10" ]; then
            EXT="ipk"
            if [ "$ARCH" == "ramips" ]; then
              URL="$RAMIPS_24_URL"
            elif [ "$ARCH" == "filogic" ]; then
              URL="$FILOGIC_24_URL"
            else
              URL="$X86_24_URL"
            fi
          else
            EXT="apk"
            if [ "$ARCH" == "ramips" ]; then
              URL="$RAMIPS_25_URL"
            elif [ "$ARCH" == "filogic" ]; then
              URL="$FILOGIC_25_URL"
            else
              URL="$X86_25_URL"
            fi
          fi

          echo "SDK_URL=$URL" >> $GITHUB_ENV
          echo "PKG_EXT=$EXT" >> $GITHUB_ENV

      - name: Download & Extract SDK
        run: |
          set -e
          mkdir -p "$WORK_ROOT"
          cd "$WORK_ROOT"

          wget -q --show-progress "$SDK_URL" -O sdk.tar.zst
          tar --use-compress-program="zstd -d -q" -xf sdk.tar.zst

          SDK_ROOT=$(find . -maxdepth 1 -type d -name "openwrt-sdk*" | head -n 1)
          SDK_ROOT=$(cd "$SDK_ROOT" && pwd)
          echo "SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV

      - name: Setup feeds
        run: |
          cd "$SDK_ROOT"

          sed -i '/^src-git zzz/d' feeds.conf.default || true
          echo "src-git zzz https://github.com/Dichgrem/luci-app-zzz.git;main" >> feeds.conf.default

          echo "更新 feeds"
          ./scripts/feeds update -a
          ./scripts/feeds update luci
          ./scripts/feeds update zzz
          echo "安装 feeds"
          ./scripts/feeds install -a -p luci
          ./scripts/feeds install luci-app-zzz zzz

      - name: Build
        run: |
          set -euo pipefail
          cd "$SDK_ROOT"
          make defconfig
          make package/luci-app-zzz/compile V=s
          make package/zzz/compile V=s

      - name: Collect packages
        run: |
          OUT="$GITHUB_WORKSPACE/output"
          mkdir -p "$OUT" 
          echo "All packages:"
          find "$SDK_ROOT/bin/packages" -type f
          find "$SDK_ROOT/bin/packages" -type f \
            \( -name "zzz-*.${PKG_EXT}" -o -name "zzz_*.${PKG_EXT}" \
               -o -name "luci-app-zzz-*.${PKG_EXT}" -o -name "luci-app-zzz_*.${PKG_EXT}" \
               -o -name "luci-i18n-zzz-zh-cn-*.${PKG_EXT}" -o -name "luci-i18n-zzz-zh-cn_*.${PKG_EXT}" \) \
            -exec cp {} "$OUT"/ \;

          ls -lah "$OUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.sdk }}-${{ inputs.openwrt_version }}
          path: output/*
          if-no-files-found: error
